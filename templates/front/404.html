<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面不存在</title>
    <link rel="stylesheet" href="https://cdn.tailwindcss.com">
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center">
    <div class="text-center">
        <div class="text-8xl font-bold gradient-text mb-4">404</div>
        <h1 class="text-2xl font-semibold mb-4">页面不存在</h1>
        <p class="text-gray-400 mb-8">抱歉，您访问的页面不存在或已被移除</p>
        <a href="{{ url_for('index') }}" class="inline-flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-xl hover:opacity-90 transition-opacity">
            返回首页
        </a>
    </div>
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</body>
</html>
